version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: nutribite-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - nutribite-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. Local Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: nutribite-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - nutribite-network

  # 3. FastAPI Python AI Microservice
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: nutribite-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - nutribite-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 10s
      retries: 3

  # 4. Express Node API Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutribite-api-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/nutribite
      - JWT_SECRET=${JWT_SECRET:-enterprise_super_secret_key_512}
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - nutribite-network

  # 5. Next.js App Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutribite-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend
    networks:
      - nutribite-network

  # 6. Prometheus Telemetry Server
  prometheus:
    image: prom/prometheus:latest
    container_name: nutribite-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ai-service
    networks:
      - nutribite-network

  # 7. Grafana Visualization Portal
  grafana:
    image: grafana/grafana:latest
    container_name: nutribite-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - nutribite-network

volumes:
  mongo-data:
  ollama-data:
  grafana-data:

networks:
  nutribite-network:
    driver: bridge
